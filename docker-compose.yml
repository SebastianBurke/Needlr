services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: needlr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: needlr
      POSTGRES_PASSWORD: needlr
      POSTGRES_DB: needlr_dev
    ports:
      - "5432:5432"
    volumes:
      - needlr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U needlr -d needlr_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  needlr_pgdata:
    name: needlr_pgdata
