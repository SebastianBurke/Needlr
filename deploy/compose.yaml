# Production deployment topology for a single DigitalOcean droplet (or any host with
# Docker + Compose v2). Caddy terminates TLS, reverse-proxies to the API container,
# which serves both the JSON endpoints and the published Blazor WASM. PostgreSQL+PostGIS
# runs in its own container with a persistent volume for data and a host-mounted volume
# for image uploads.
#
# Run from the repo root:
#   docker compose --env-file deploy/.env -f deploy/compose.yaml up -d
#
# All secrets come from deploy/.env. See deploy/.env.example for the full key list.

name: needlr

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:    ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout:  5s
      retries:  20
      start_period: 10s
    # Postgres is reached only via the internal docker network; never publish 5432 to
    # the host unless you also set up a firewall rule.

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: needlr-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:        http://+:8080
      ConnectionStrings__Postgres: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Issuer:     ${JWT_ISSUER}
      Jwt__Audience:   ${JWT_AUDIENCE}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenLifetimeMinutes:  ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-30}
      Jwt__RefreshTokenLifetimeDays:    ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-30}
      Hangfire__EnableServer: "true"
      Stripe__SecretKey:        ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret:    ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__PlatformReturnUrl: ${STRIPE_PLATFORM_RETURN_URL:-}
      ImageStorage__Backend:        Local
      ImageStorage__LocalRootPath:  /var/needlr/uploads
      ImageStorage__LocalPublicBaseUrl: /media
      Notifications__SendGridApiKey:  ${SENDGRID_API_KEY:-}
      Notifications__FromEmail:       ${NOTIFICATIONS_FROM_EMAIL:-}
      Notifications__FromName:        ${NOTIFICATIONS_FROM_NAME:-Needlr}
      Notifications__VapidSubject:    ${VAPID_SUBJECT:-}
      Notifications__VapidPublicKey:  ${VAPID_PUBLIC_KEY:-}
      Notifications__VapidPrivateKey: ${VAPID_PRIVATE_KEY:-}
    volumes:
      - uploads:/var/needlr/uploads
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    # Bind explicitly on both IPv4 and IPv6 so the droplet's free DO IPv6 address
    # serves traffic alongside its IPv4 address. The dual short-form ports work on
    # Docker 26+ without enabling experimental ipv6 networking on the daemon — each
    # entry creates a separate published listener.
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
      - "[::]:80:80"
      - "[::]:443:443"
    environment:
      NEEDLR_DOMAIN: ${NEEDLR_DOMAIN}
      NEEDLR_TLS_EMAIL: ${NEEDLR_TLS_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
